<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>精娃 vs 憨娃 — 先天气质评估</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== 顶部 Banner ========== -->
  <header class="banner">
    <p class="banner-brand">青稞家庭教育 · 先天气质评估</p>
    <div class="banner-icon">🧒</div>
    <h1>你的孩子是精娃还是憨娃？</h1>
    <p class="banner-sub">气质是与生俱来的——每个孩子对环境的<strong>敏感度</strong>和<strong>反应方式</strong>天生不同。<br>读懂孩子的"原始出厂设置"，才能<strong>因材施教、扬长补短</strong>。<br>气质无好坏，差异即礼物 ✨</p>
  </header>

  <!-- ========== 特征勾选区 ========== -->
  <p class="checklist-hint">阅读以下场景，符合你家孩子的请点击勾选 👇</p>
  <main id="checklist">
    <!-- 由 script.js 动态生成 -->
  </main>

  <!-- ========== 操作按钮 ========== -->
  <div class="action-bar">
    <button id="submit-btn" class="btn-primary" disabled>🔍 查看结果（每个维度至少选 1 题）</button>
    <button id="reset-btn" class="btn-secondary" style="display:none;">🔄 重测</button>
  </div>

  <!-- ========== 结果展示区 ========== -->
  <section id="result" class="result-hidden">
    <!-- 由 script.js 动态填充 -->
  </section>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p class="footer-company">青稞时代（广东）心理咨询有限公司</p>
    <p class="footer-expert">📱 关注「青稞心理咨询」公众号，获取更多科学育儿内容</p>
    <p class="footer-copy">© 2026 青稞家庭教育 · 先天气质无好坏，因材施教是核心</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
